<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logite | Circuit Builder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="toolbar">
        <div class="logo">
            <h1 style="font-size: 1.5rem; margin: 0 0 20px 0; color: var(--accent);">LOGITE</h1>
        </div>

        <div class="dropdown" id="logicgates">
            <button class="dropbtn">LOGIC GATES</button>
            <div class="dropdown-content">
                <button id="andGate">AND Gate</button>
                <button id="orGate">OR Gate</button>
                <button id="notGate">NOT Gate</button>
                <button id="norGate">NOR Gate</button>
                <button id="nandGate">NAND Gate</button>
                <button id="xorGate">XOR Gate</button>
            </div>
        </div>
           
        <div class="dropdown" id="terminalDropdown">
            <button class="dropbtn">TERMINALS</button>
            <div class="dropdown-content">
                <button id="inputSwitchButton">Input Switch</button>
                <button id="outputTerminalButton">Output Terminal</button>
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
            <button id="undoButton">Undo Action</button>
            <button id="clearButton">New Grid</button>
            <button id="deleteButton">Delete Mode</button>
            <button id="saveCircuitButton">Save Circuit</button>
            <button id="loadCircuitButton">Load Circuit</button>
            <button onclick="location.href='web.html'" style="background: transparent; border: 1px solid var(--border);">Back to Home</button>
        </div>
    </aside>

    <main class="sandbox">
        <div class="grid-container" id="grid-container">
            <!-- Grid generated by script.js -->
        </div>
        <svg id="flowline-svg"></svg>
    </main>

    <script src="script.js"></script>
</body>
</html>
