<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logite | Digital Logic Simulator</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero {
            max-width: 800px;
            padding: 40px;
        }
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .cta-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .btn-primary {
            background-color: var(--accent);
            color: white;
            padding: 16px 32px;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px var(--accent-glow);
        }
        .btn-secondary {
            background-color: var(--bg-cell);
            color: var(--text-main);
            padding: 16px 32px;
            border-radius: var(--radius);
            font-weight: 600;
            text-decoration: none;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: var(--bg-cell-hover);
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>LOGITE</h1>
        <p>Master the foundations of digital logic through an intuitive, powerful, and beautiful simulator. Build, test, and save your circuits with ease.</p>
        <div class="cta-group">
            <a href="mini_project.html" class="btn-primary">Start Building</a>
            <a href="encyclo.html" class="btn-secondary">Learn Logic</a>
        </div>
    </section>

    <footer style="position: absolute; bottom: 24px; color: var(--text-muted); font-size: 0.875rem;">
        &copy; 2026 Logite Digital Logic. Professionalized with care.
    </footer>
</body>
</html>
